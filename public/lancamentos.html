<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastinhos – Lançamentos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h1>💰 Gastinhos</h1>
      <p>Finanças pessoais</p>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1"></rect>
        </svg>
        Dashboard
      </a>
      <a href="lancamentos.html" class="active">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Lançamentos
      </a>
    </nav>
    <div class="sidebar-footer">
      &copy; 2026 Gastinhos
    </div>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Main content -->
  <div class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <span class="topbar-title">Lançamentos</span>
      </div>
    </header>

    <div class="page-content">
      <div class="form-page-grid">

        <!-- Form card -->
        <div class="form-card">
          <div class="form-title">Novo Lançamento</div>

          <!-- Type toggle -->
          <div class="type-toggle">
            <button class="type-btn active-income" id="btnIncome" data-type="income" type="button">
              ↑ Receita
            </button>
            <button class="type-btn" id="btnExpense" data-type="expense" type="button">
              ↓ Despesa
            </button>
          </div>

          <form id="transactionForm" novalidate>
            <!-- Date -->
            <div class="form-group">
              <label class="form-label" for="fieldDate">Data</label>
              <input type="date" id="fieldDate" class="form-control" required />
              <div class="form-error-msg" id="errDate">Data é obrigatória.</div>
            </div>

            <!-- Amount -->
            <div class="form-group">
              <label class="form-label" for="fieldAmount">Valor</label>
              <div class="currency-wrapper">
                <span class="currency-prefix">R$</span>
                <input
                  type="number"
                  id="fieldAmount"
                  class="form-control"
                  min="0.01"
                  step="0.01"
                  placeholder="0,00"
                  required
                />
              </div>
              <div class="form-error-msg" id="errAmount">Informe um valor maior que zero.</div>
            </div>

            <!-- Category -->
            <div class="form-group">
              <label class="form-label" for="fieldCategory">Categoria</label>
              <select id="fieldCategory" class="form-control" required>
                <option value="">Selecione...</option>
              </select>
              <div class="form-error-msg" id="errCategory">Selecione uma categoria.</div>
            </div>

            <!-- Person -->
            <div class="form-group">
              <label class="form-label">Pessoa</label>
              <div class="person-selector" id="personSelector">
                <button type="button" class="person-btn active" data-person="Felipe">Felipe</button>
                <button type="button" class="person-btn" data-person="Esposa">Esposa</button>
                <button type="button" class="person-btn" data-person="Casal">Casal</button>
              </div>
              <div class="form-error-msg" id="errPerson" style="display:none;"></div>
            </div>

            <!-- Description -->
            <div class="form-group">
              <label class="form-label" for="fieldDesc">Descrição</label>
              <input
                type="text"
                id="fieldDesc"
                class="form-control"
                placeholder="Ex: Supermercado quinzenal"
                maxlength="120"
                required
              />
              <div class="form-error-msg" id="errDesc">Descrição é obrigatória.</div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
              Salvar Lançamento
            </button>
          </form>
        </div>

        <!-- Recent transactions list -->
        <div>
          <div class="section-header" style="margin-bottom:12px;">
            <span class="section-title">Transações Recentes</span>
            <span id="totalCount" style="font-size:13px;color:var(--text-muted);"></span>
          </div>

          <!-- Filters for list -->
          <div class="filters-bar" style="margin-bottom:16px;">
            <label for="listMonth">Mês:</label>
            <select id="listMonth">
              <option value="all">Todos</option>
            </select>
            <label for="listType">Tipo:</label>
            <select id="listType">
              <option value="all">Todos</option>
              <option value="income">Receitas</option>
              <option value="expense">Despesas</option>
            </select>
          </div>

          <div class="table-card">
            <table class="transactions-table">
              <thead>
                <tr>
                  <th style="width:40px;"></th>
                  <th>Data</th>
                  <th>Descrição</th>
                  <th>Categoria</th>
                  <th>Pessoa</th>
                  <th>Valor</th>
                  <th style="width:48px;"></th>
                </tr>
              </thead>
              <tbody id="listBody">
                <tr><td colspan="7">
                  <div class="empty-state"><p>Carregando...</p></div>
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div><!-- end page-content -->
  </div><!-- end main-content -->
</div><!-- end app-layout -->

<script src="app.js"></script>
<script>
'use strict';
const {
  INCOME_CATEGORIES, EXPENSE_CATEGORIES, PEOPLE,
  formatBRL, formatDate, getCurrentMonth, getLastNMonths, formatMonthLabel,
  getTransactions, createTransaction, deleteTransaction,
  showToast, initSidebar, buildTransactionRow,
} = window.GastApp;

// State
let selectedType = 'income';
let selectedPerson = 'Felipe';
let listFilterMonth = 'all';
let listFilterType = 'all';

// ── Init ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  initSidebar();
  setDefaultDate();
  populateCategorySelect('income');
  populateMonthFilter();
  attachTypeToggle();
  attachPersonSelector();
  attachListFilters();
  attachFormSubmit();
  loadTransactionList();
});

function setDefaultDate() {
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  document.getElementById('fieldDate').value = `${y}-${m}-${d}`;
}

function populateCategorySelect(type) {
  const select = document.getElementById('fieldCategory');
  const cats = type === 'income' ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
  select.innerHTML = '<option value="">Selecione...</option>';
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  });
}

async function populateMonthFilter() {
  // Fetch all to know which months exist
  const months = getLastNMonths(12);
  const listMonth = document.getElementById('listMonth');
  listMonth.innerHTML = '<option value="all">Todos os meses</option>';
  months.reverse().forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = formatMonthLabel(m);
    if (m === getCurrentMonth()) opt.selected = true;
    listMonth.appendChild(opt);
  });
  listFilterMonth = getCurrentMonth();
}

// ── Type toggle ──────────────────────────────────────────────────────────────

function attachTypeToggle() {
  document.getElementById('btnIncome').addEventListener('click', () => setType('income'));
  document.getElementById('btnExpense').addEventListener('click', () => setType('expense'));
}

function setType(type) {
  selectedType = type;
  const btnIncome = document.getElementById('btnIncome');
  const btnExpense = document.getElementById('btnExpense');

  if (type === 'income') {
    btnIncome.className = 'type-btn active-income';
    btnExpense.className = 'type-btn';
  } else {
    btnExpense.className = 'type-btn active-expense';
    btnIncome.className = 'type-btn';
  }
  populateCategorySelect(type);
}

// ── Person selector ──────────────────────────────────────────────────────────

function attachPersonSelector() {
  document.querySelectorAll('.person-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.person-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPerson = btn.dataset.person;
    });
  });
}

// ── List filters ─────────────────────────────────────────────────────────────

function attachListFilters() {
  document.getElementById('listMonth').addEventListener('change', e => {
    listFilterMonth = e.target.value;
    loadTransactionList();
  });
  document.getElementById('listType').addEventListener('change', e => {
    listFilterType = e.target.value;
    loadTransactionList();
  });
}

// ── Form submit ──────────────────────────────────────────────────────────────

function attachFormSubmit() {
  document.getElementById('transactionForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!validateForm()) return;

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner"></span> Salvando...';

    const payload = {
      type: selectedType,
      date: document.getElementById('fieldDate').value,
      amount: parseFloat(document.getElementById('fieldAmount').value),
      category: document.getElementById('fieldCategory').value,
      person: selectedPerson,
      description: document.getElementById('fieldDesc').value.trim(),
    };

    try {
      await createTransaction(payload);
      showToast('Lançamento salvo com sucesso!');
      resetForm();
      loadTransactionList();
    } catch (err) {
      showToast('Erro ao salvar: ' + err.message, 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Salvar Lançamento';
    }
  });
}

function validateForm() {
  let valid = true;

  const date = document.getElementById('fieldDate').value;
  setFieldError('fieldDate', 'errDate', !date);
  if (!date) valid = false;

  const amount = parseFloat(document.getElementById('fieldAmount').value);
  setFieldError('fieldAmount', 'errAmount', !amount || amount <= 0);
  if (!amount || amount <= 0) valid = false;

  const category = document.getElementById('fieldCategory').value;
  setFieldError('fieldCategory', 'errCategory', !category);
  if (!category) valid = false;

  const desc = document.getElementById('fieldDesc').value.trim();
  setFieldError('fieldDesc', 'errDesc', !desc);
  if (!desc) valid = false;

  return valid;
}

function setFieldError(fieldId, errId, hasError) {
  const field = document.getElementById(fieldId);
  const errEl = document.getElementById(errId);
  if (hasError) {
    field.classList.add('error');
    errEl.classList.add('visible');
  } else {
    field.classList.remove('error');
    errEl.classList.remove('visible');
  }
}

function resetForm() {
  document.getElementById('fieldAmount').value = '';
  document.getElementById('fieldDesc').value = '';
  document.getElementById('fieldCategory').value = '';
  // Reset type to income
  setType('income');
  // Reset person to Felipe
  document.querySelectorAll('.person-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.person === 'Felipe');
  });
  selectedPerson = 'Felipe';
  setDefaultDate();
  // Clear error states
  ['fieldDate','fieldAmount','fieldCategory','fieldDesc'].forEach(id => {
    document.getElementById(id).classList.remove('error');
  });
  ['errDate','errAmount','errCategory','errDesc'].forEach(id => {
    document.getElementById(id).classList.remove('visible');
  });
}

// ── Transaction list ─────────────────────────────────────────────────────────

async function loadTransactionList() {
  const params = {};
  if (listFilterMonth !== 'all') params.month = listFilterMonth;
  if (listFilterType !== 'all') params.type = listFilterType;

  try {
    const transactions = await getTransactions(params);
    renderList(transactions.slice(0, 20));
    document.getElementById('totalCount').textContent =
      transactions.length + ' transaç' + (transactions.length === 1 ? 'ão' : 'ões');
  } catch (err) {
    showToast('Erro ao carregar lista: ' + err.message, 'error');
  }
}

function renderList(transactions) {
  const tbody = document.getElementById('listBody');
  tbody.innerHTML = '';

  if (transactions.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <p>Nenhuma transação encontrada.</p>
      </div>
    </td></tr>`;
    return;
  }

  transactions.forEach(t => {
    const row = buildTransactionRow(t, handleDelete);
    tbody.appendChild(row);
  });
}

async function handleDelete(id) {
  if (!confirm('Deseja excluir esta transação?')) return;
  try {
    await deleteTransaction(id);
    showToast('Transação excluída!');
    loadTransactionList();
  } catch (err) {
    showToast('Erro ao excluir: ' + err.message, 'error');
  }
}
</script>
</body>
</html>
